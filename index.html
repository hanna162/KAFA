            "• <strong>Sama' (سَمْعٌ)</strong> - <em>Artinya: Mendengar (مڠدڠر)</em>. Lawannya: Summun (صُمٌّ - Pekak). Allah mendengar segala bunyi dan bisikan, walaupun suara hati makhluk di dasar laut yang gelap.<br>" +
            "• <strong>Basar (بَصَرٌ)</strong> - <em>Artinya: Melihat (مليهت)</em>. Lawannya: 'Umyun (عُمْيٌ - Buta). Penglihatan Allah sangat terang dan tidak memerlukan alat bantuan atau cahaya.<br>" +
            "• <strong>Kalam (كَلَامٌ)</strong> - <em>Artinya: Berkata-kata (بركات-كات)</em>. Lawannya: Bukmun (بُكْمٌ - Bisu). Allah berkata-kata melalui wahyu-Nya (seperti Al-Quran) tanpa memerlukan suara, huruf, atau bahasa seperti makhluk.",

        5: {

          tip: "Niat puasa boleh dibaca setiap malam, atau niat sebulan penuh pada malam pertama Ramadan untuk mengelakkan terlupa."

      const tabTajwidBtn = document.getElementById("tab-tajwid");
      const tabHafazanBtn = document.getElementById("tab-hafazan");
      const lesson = lessons["Al-Quran"][state.activeYear];
      
      if (state.activeQuranTab === "tajwid") {
        tabTajwidBtn.className = "flex-1 text-center py-2.5 px-3 rounded-lg text-xs font-extrabold bg-[#53ad74] text-white shadow-sm transition-all";
        tabHafazanBtn.className = "flex-1 text-center py-2.5 px-3 rounded-lg text-xs font-bold text-[#5c7a67] hover:bg-[#e4ebd3] transition-all";
        
        document.getElementById("lesson-title").textContent = lesson.tajwidTitle;
        document.getElementById("lesson-summary").textContent = lesson.tajwidSummary;
        document.getElementById("lesson-points").innerHTML = lesson.tajwidPoints.map(point => `
          <div class="lesson-point">
            <span class="point-dot"><i data-lucide="check" style="width:14px;height:14px"></i></span>
            <span>${point}</span>
          </div>
        `).join("");
        document.getElementById("lesson-tip").innerHTML = `<strong>Tip Tajwid:</strong> ${lesson.tajwidTip}`;
      } else {
        tabHafazanBtn.className = "flex-1 text-center py-2.5 px-3 rounded-lg text-xs font-extrabold bg-[#53ad74] text-white shadow-sm transition-all";
        tabTajwidBtn.className = "flex-1 text-center py-2.5 px-3 rounded-lg text-xs font-bold text-[#5c7a67] hover:bg-[#e4ebd3] transition-all";
        
        document.getElementById("lesson-title").textContent = lesson.hafazanTitle;
        document.getElementById("lesson-summary").textContent = lesson.hafazanSummary;
        document.getElementById("lesson-points").innerHTML = lesson.hafazanPoints.map(point => `
          <div class="lesson-point">
            <span class="point-dot"><i data-lucide="book-open" style="width:14px;height:14px"></i></span>
            <span>${point}</span>
          </div>
        `).join("");
        document.getElementById("lesson-tip").innerHTML = `<strong>Tip Amali:</strong> ${lesson.hafazanTip}`;
      }
      lucide.createIcons();
    }

    document.getElementById("tab-tajwid").addEventListener("click", () => {
      state.activeQuranTab = "tajwid";
      updateQuranTabs();
    });

    document.getElementById("tab-hafazan").addEventListener("click", () => {
      state.activeQuranTab = "hafazan";
      updateQuranTabs();
    });

    function filteredQuestions() {
      return state.practiceSubject === "Semua"
        ? questionBank
        : questionBank.filter(question => question.subject === state.practiceSubject);
    }

    function renderPractice() {
      const subjects = ["Semua", "Ibadah", "Akidah", "Sirah", "Al-Quran", "Adab", "Jawi", "Bahasa Arab"];
      document.getElementById("practice-filters").innerHTML = subjects.map(subject => `
        <button class="filter-chip ${subject === state.practiceSubject ? "active" : ""}" type="button" data-filter="${subject}">${subject}</button>
      `).join("");

      document.querySelectorAll("[data-filter]").forEach(button => {
        button.addEventListener("click", () => {
          state.practiceSubject = button.dataset.filter;
          renderPractice();
        });
      });

      const questions = filteredQuestions();
      const questionList = document.getElementById("question-list");

      if (!questions.length) {
        questionList.innerHTML = `<div class="empty-note">Latihan untuk subjek ini akan ditambah tidak lama lagi.</div>`;
        updateScore();
        return;
      }

      questionList.innerHTML = questions.map((question, index) => {
        const answered = Object.prototype.hasOwnProperty.call(state.answers, question.id);
        const selected = state.answers[question.id];
        const isCorrect = selected === question.answer;

        return `
          <article class="question-card" data-question-id="${question.id}">
            <span class="question-label">${question.subject} · ${question.type}</span>
            <h2 class="font-extrabold leading-6 text-[0.95rem] mt-3">${index + 1}. ${question.question}</h2>
            <div class="mt-3">
              ${question.options.map((option, optionIndex) => {
                let classes = "answer-option";
                if (answered && optionIndex === question.answer) classes += " correct";
                else if (answered && optionIndex === selected) classes += " wrong";
                return `<button class="${classes}" type="button" data-answer="${optionIndex}" ${answered ? "disabled" : ""}>${option}</button>`;
              }).join("")}
            </div>
            ${answered ? `<div class="feedback ${isCorrect ? "correct" : "wrong"}">${isCorrect ? "✓ Tepat! " : "✦ Cuba lagi pada soalan seterusnya. "}${question.explanation}</div>` : ""}
          </article>
        `;
      }).join("");

      questionList.querySelectorAll("[data-question-id]").forEach(card => {
        card.querySelectorAll("[data-answer]").forEach(button => {
          button.addEventListener("click", () => {
            const question = questionBank.find(item => item.id === card.dataset.questionId);
            if (Object.prototype.hasOwnProperty.call(state.answers, question.id)) return;
            state.answers[question.id] = Number(button.dataset.answer);
            renderPractice();
          });
        });
      });

      updateScore();
    }

    function answeredQuestions() {
      return questionBank.filter(question => Object.prototype.hasOwnProperty.call(state.answers, question.id));
    }

    function correctCount() {
      return answeredQuestions().filter(question => state.answers[question.id] === question.answer).length;
    }

    function updateScore() {
      const answered = answeredQuestions().length;
      const correct = correctCount();
      const accuracy = answered ? Math.round((correct / answered) * 100) : 0;
      document.getElementById("score-summary").textContent = `${correct} / ${answered} betul`;
      document.getElementById("score-circle").textContent = `${accuracy}%`;
    }

    function renderAchievements() {
      const answered = answeredQuestions().length;
      const correct = correctCount();
      const accuracy = answered ? Math.round((correct / answered) * 100) : 0;
      const badges = [
        { icon: "circle-play", title: "Langkah Pertama", text: "Jawab sekurang-kurangnya 1 soalan.", unlocked: answered >= 1 },
        { icon: "star", title: "Bintang Ilmu", text: "Kumpulkan 3 jawapan tepat.", unlocked: correct >= 3 },
        { icon: "medal", title: "Juara KAFA", text: "Capai 80% ketepatan selepas 5 soalan.", unlocked: answered >= 5 && accuracy >= 80 }
      ];

      document.getElementById("achievement-summary-text").textContent = answered
        ? `${accuracy}% ketepatan setakat ini`
        : "Mulakan latihan untuk kumpul lencana";
      document.getElementById("mastery-progress").style.width = `${Math.min(100, accuracy)}%`;

      document.getElementById("achievement-list").innerHTML = badges.map(badge => `
        <article class="achievement-card ${badge.unlocked ? "" : "locked"}">
          <div class="achievement-icon"><i data-lucide="${badge.icon}"></i></div>
          <div>
            <h2 class="font-extrabold text-sm">${badge.title}</h2>
            <p class="text-xs text-[#68806f] leading-5 mt-1">${badge.unlocked ? "Lencana telah dibuka! Tahniah." : badge.text}</p>
          </div>
        </article>
      `).join("");
      lucide.createIcons();
    }

    document.getElementById("start-learning").addEventListener("click", () => showView("subjects-view"));
    document.getElementById("back-to-subjects").addEventListener("click", () => showView("subjects-view"));
    document.getElementById("back-to-levels").addEventListener("click", () => openLevels(state.activeSubject));
    document.getElementById("lesson-practice").addEventListener("click", () => {
      state.practiceSubject = state.activeSubject;
      showView("practice-view");
    });

    document.querySelectorAll(".subject-card").forEach(card => {
      card.addEventListener("click", () => openLevels(card.dataset.subject));
    });

    navTabs.forEach(tab => {
      tab.addEventListener("click", () => showView(tab.dataset.view));
    });

    document.getElementById("reading-mode-toggle").addEventListener("click", event => {
      state.readingMode = !state.readingMode;
      appShell.classList.toggle("reading-mode", state.readingMode);
      event.currentTarget.classList.toggle("on", state.readingMode);
      event.currentTarget.setAttribute("aria-checked", String(state.readingMode));
    });

    document.getElementById("reset-session").addEventListener("click", () => {
      state.answers = {};
      renderPractice();
      renderAchievements();
    });

    lucide.createIcons();
  </script>
 </body>
</html>
